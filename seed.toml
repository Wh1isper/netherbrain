# Netherbrain Seed Data
#
# Declarative configuration for presets and workspaces.
# Applied on startup (NETHER_SEED_FILE) or manually (netherbrain db seed).
#
# Upsert semantics: creates if missing, updates if existing.
# Removing an entry does NOT delete it from the database.

# -- Presets ------------------------------------------------------------------

[[presets]]
preset_id = "general-agent"
name = "General Agent"
description = "Full-featured agent with access to all tools."
is_default = true
system_prompt = """
You are a skilled assistant with access to files, shell, web, and more.
Be concise and direct. Write clean, well-tested code when coding.
"""

[presets.model]
name = "homelab@anthropic:anth-subs/claude-sonnet-4-6"

[[presets.toolsets]]
toolset_name = "core"
enabled = true

[[presets]]
preset_id = "chat-only"
name = "Chat Only"
description = "Pure conversation mode without any tools."
system_prompt = "You are a helpful assistant."

[presets.model]
name = "homelab@anthropic:anth-subs/claude-sonnet-4-6"

# -- Workspaces ---------------------------------------------------------------

[[workspaces]]
workspace_id = "default"
name = "Default"
projects = ["default"]

[workspaces.metadata]
source = "seed"
